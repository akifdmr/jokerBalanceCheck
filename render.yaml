services:
  - type: web
    name: my-api
    runtime: python
    buildCommand: |
      apt-get update
      apt-get install -y libxml2-dev libxslt1-dev
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11